server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for any unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* to the backend, stripping the /api prefix.
    # Because both frontend and backend are reached through this single
    # Nginx on port 80, the browser sees one origin and CORS is never triggered.
    location /api/ {
        proxy_pass         http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
